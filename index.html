<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Testamenttipyörä</title>
<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
    overflow-x: hidden;
    background:
        radial-gradient(circle at 20% 20%, rgba(255, 216, 107, 0.28), transparent 25%),
        radial-gradient(circle at 80% 15%, rgba(255, 65, 108, 0.30), transparent 28%),
        radial-gradient(circle at 50% 85%, rgba(78, 205, 196, 0.22), transparent 28%),
        linear-gradient(135deg, #170024 0%, #25104a 45%, #090b24 100%);
}

body::before {
    content: "";
    position: fixed;
    inset: -50%;
    background:
        conic-gradient(from 0deg, transparent, rgba(255,255,255,0.10), transparent, rgba(255,215,0,0.12), transparent);
    animation: lights 18s linear infinite;
    z-index: -2;
}

@keyframes lights { to { transform: rotate(360deg); } }

.stage-lights {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
    background-image:
        radial-gradient(circle, rgba(255,255,255,0.45) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(255,215,0,0.35) 0 2px, transparent 3px);
    background-size: 90px 90px, 130px 130px;
    animation: sparkle 4s ease-in-out infinite alternate;
    opacity: 0.45;
}

@keyframes sparkle {
    from { opacity: 0.25; transform: scale(1); }
    to { opacity: 0.65; transform: scale(1.03); }
}

.hero { padding: 28px 16px 4px; }

h1 {
    margin: 0;
    font-size: clamp(34px, 6vw, 68px);
    text-shadow: 0 0 12px rgba(255,255,255,0.65), 0 0 30px rgba(255,75,43,0.75);
}

.subtitle {
    margin: 12px auto 0;
    max-width: 720px;
    font-size: 18px;
    opacity: 0.92;
}

.disclaimer {
    margin: 14px auto 0;
    max-width: 760px;
    padding: 12px 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.22);
    font-size: 14px;
    line-height: 1.45;
}

.game-area {
    width: min(94vw, 760px);
    margin: 22px auto 40px;
    padding: 24px;
    border-radius: 34px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.22);
    box-shadow: 0 30px 90px rgba(0,0,0,0.42), inset 0 0 45px rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
}

#wheel-container {
    position: relative;
    width: min(88vw, 560px);
    height: min(88vw, 560px);
    margin: 0 auto 24px;
    display: grid;
    place-items: center;
}

#wheel-container::before {
    content: "";
    position: absolute;
    width: 104%;
    height: 104%;
    border-radius: 50%;
    background: conic-gradient(#fff6b7, #f7b733, #fff1a8, #d98b00, #fff6b7);
    box-shadow: 0 0 35px rgba(255,215,0,0.75), 0 0 90px rgba(255,65,108,0.28);
    z-index: 0;
}

#wheel-container::after {
    content: "";
    position: absolute;
    width: 110%;
    height: 110%;
    border-radius: 50%;
    background:
        radial-gradient(circle at 50% 0%, #fff 0 5px, transparent 6px),
        radial-gradient(circle at 85% 15%, #fff 0 5px, transparent 6px),
        radial-gradient(circle at 100% 50%, #fff 0 5px, transparent 6px),
        radial-gradient(circle at 85% 85%, #fff 0 5px, transparent 6px),
        radial-gradient(circle at 50% 100%, #fff 0 5px, transparent 6px),
        radial-gradient(circle at 15% 85%, #fff 0 5px, transparent 6px),
        radial-gradient(circle at 0% 50%, #fff 0 5px, transparent 6px),
        radial-gradient(circle at 15% 15%, #fff 0 5px, transparent 6px);
    filter: drop-shadow(0 0 10px gold);
    animation: bulbs 1.1s infinite alternate;
    z-index: 1;
    pointer-events: none;
}

@keyframes bulbs {
    from { opacity: 0.35; }
    to { opacity: 1; }
}

canvas {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: white;
    box-shadow: inset 0 0 22px rgba(0,0,0,0.35), 0 18px 55px rgba(0,0,0,0.55);
}

#pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 54px;
    height: 76px;
    background: linear-gradient(#fff, #ffcc00 35%, #ff1744);
    clip-path: polygon(50% 100%, 0 0, 100% 0);
    z-index: 5;
    filter: drop-shadow(0 8px 12px rgba(0,0,0,0.55));
}

.center-badge {
    position: absolute;
    z-index: 4;
    width: min(34vw, 170px);
    height: min(34vw, 170px);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff 0%, #ffe39a 25%, #f7b733 58%, #b76800 100%);
    border: 5px solid rgba(255,255,255,0.75);
    box-shadow: 0 0 22px rgba(255,215,0,0.8), inset 0 0 18px rgba(255,255,255,0.65);
    pointer-events: none;
}

button {
    padding: 16px 34px;
    font-size: 20px;
    font-weight: 800;
    cursor: pointer;
    background: linear-gradient(45deg, #ffcc00, #ff416c, #8338ec);
    background-size: 220% 220%;
    animation: buttonGlow 2.2s ease infinite;
    color: white;
    border: none;
    border-radius: 999px;
    box-shadow: 0 12px 28px rgba(255,65,108,0.45), 0 0 28px rgba(255,204,0,0.35);
}

@keyframes buttonGlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

#overlay {
    position: fixed;
    inset: 0;
    background: radial-gradient(circle, rgba(255,204,0,0.22), rgba(0,0,0,0.92));
    display: none;
    align-items: center;
    justify-content: center;
    font-size: clamp(38px, 8vw, 90px);
    font-weight: 900;
    z-index: 10;
    text-shadow: 0 0 18px white, 0 0 40px #ff416c;
}

#resultCard {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background: radial-gradient(circle at center, rgba(255,204,0,0.22), rgba(0,0,0,0.92));
    font-size: 28px;
    z-index: 20;
}

#resultText {
    background: linear-gradient(135deg, #ffffff, #fff1b8);
    color: #1d1230;
    padding: 36px;
    border-radius: 26px;
    width: min(88vw, 620px);
    box-shadow: 0 0 40px rgba(255,215,0,0.8), 0 30px 90px rgba(0,0,0,0.65);
}

#resultText b {
    display: block;
    margin-top: 10px;
    font-size: clamp(34px, 6vw, 62px);
    color: #ff1744;
}

.confetti {
    position: fixed;
    width: 8px;
    height: 12px;
    top: -20px;
    animation: fall linear forwards;
    z-index: 30;
}

@keyframes fall {
    to { transform: translateY(105vh) rotate(720deg); }
}

.shake { animation: shake 0.35s ease; }

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-7px); }
    50% { transform: translateX(7px); }
    75% { transform: translateX(-4px); }
    100% { transform: translateX(0); }
}
</style>
</head>

<body>

<div class="stage-lights"></div>

<div class="hero">
    <h1>🎡 Testamenttipyörä</h1>
    <p class="subtitle">
        Pyöräytä kohtalon kultainen kiekko ja katso, minne jälkeesi jäävä omaisuus dramaattisesti ohjautuu.
    </p>
    <p class="disclaimer">
        Huom. Tämä on humoristinen selainpeli/demo, ei oikeudellinen testamenttiasiakirja tai lahjoitussuositus.
    </p>
</div>

<div class="game-area">
    <div id="wheel-container">
        <div id="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
        <div class="center-badge"></div>
    </div>

    <button onclick="startShow()">✨ Pyöräytä ✨</button>
</div>

<div id="overlay">Testamentti lähtee…</div>

<div id="resultCard">
    <div id="resultText"></div>
    <br>
    <button onclick="location.reload()">Pyöräytä uudelleen</button>
</div>

<script>
const sectors = [
    "Suomen Punainen Risti",
    "WWF Suomi",
    "Pelastakaa Lapset",
    "Unicef Suomi",
    "Syöpäsäätiö",
    "Mannerheimin Lastensuojeluliitto",
    "Luonnonperintösäätiö",
    "Helsingin Diakonissalaitos",
    "Perussuomalaiset",
    "Vihreät"
];

const colors = [
    "#FF1744", "#00BFA6", "#FFD600", "#2979FF", "#FF9100",
    "#7C4DFF", "#00C853", "#D500F9", "#00B0FF", "#64DD17"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let angle = 0;
const arc = (2 * Math.PI) / sectors.length;

function drawWheel() {
    ctx.clearRect(0, 0, 500, 500);

    for (let i = 0; i < sectors.length; i++) {
        const start = i * arc;

        ctx.beginPath();
        ctx.moveTo(250, 250);
        ctx.arc(250, 250, 240, start, start + arc);
        ctx.closePath();
        ctx.fillStyle = colors[i];
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.9)";
        ctx.lineWidth = 4;
        ctx.stroke();

        ctx.save();
        ctx.translate(250, 250);
        ctx.rotate(start + arc / 2);

        ctx.fillStyle = "white";
        ctx.strokeStyle = "rgba(0,0,0,0.58)";
        ctx.lineWidth = 4;
        ctx.font = "900 12px Arial";
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";

        const words = sectors[i].split(" ");
        const lines = [];
        let line = "";

        words.forEach(word => {
            const testLine = line ? line + " " + word : word;
            if (ctx.measureText(testLine).width > 138 && line) {
                lines.push(line);
                line = word;
            } else {
                line = testLine;
            }
        });

        lines.push(line);

        const lineHeight = 14;
        const startY = -((lines.length - 1) * lineHeight) / 2;

        lines.forEach((lineText, index) => {
            const y = startY + index * lineHeight;
            ctx.strokeText(lineText, 222, y);
            ctx.fillText(lineText, 222, y);
        });

        ctx.restore();
    }

    ctx.beginPath();
    ctx.arc(250, 250, 246, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255,255,255,0.85)";
    ctx.lineWidth = 8;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(250, 250, 92, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.12)";
    ctx.fill();
}

drawWheel();

let ctxAudio;

function ensureAudio() {
    if (!ctxAudio) {
        ctxAudio = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playTick() {
    ensureAudio();

    const o = ctxAudio.createOscillator();
    const g = ctxAudio.createGain();

    o.connect(g);
    g.connect(ctxAudio.destination);

    o.frequency.value = 900;
    o.type = "square";

    g.gain.setValueAtTime(0.05, ctxAudio.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctxAudio.currentTime + 0.045);

    o.start();
    o.stop(ctxAudio.currentTime + 0.05);
}

function fanfare() {
    ensureAudio();

    const notes = [523, 659, 784, 1046];

    notes.forEach((freq, i) => {
        const o = ctxAudio.createOscillator();
        const g = ctxAudio.createGain();

        o.connect(g);
        g.connect(ctxAudio.destination);

        o.frequency.value = freq;
        o.type = "triangle";

        const t = ctxAudio.currentTime + i * 0.12;

        g.gain.setValueAtTime(0.08, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.45);

        o.start(t);
        o.stop(t + 0.48);
    });
}

function startShow() {
    ensureAudio();

    const overlay = document.getElementById("overlay");
    overlay.style.display = "flex";

    setTimeout(() => {
        overlay.style.display = "none";
        spin();
    }, 1400);
}

function spin() {
    let velocity = 38 + Math.random() * 18;
    let tickCounter = 0;

    function animate() {
        velocity *= 0.975;
        angle += velocity;

        canvas.style.transform = `rotate(${angle}deg)`;

        tickCounter++;

        if (tickCounter % Math.max(1, Math.floor(velocity / 6)) === 0) {
            playTick();
        }

        if (velocity > 0.45) {
            requestAnimationFrame(animate);
        } else {
            stop();
        }
    }

    animate();
}

function stop() {
    fanfare();

    document.querySelector(".game-area").classList.add("shake");

    const normalizedAngle = ((angle % 360) + 360) % 360;
    const pointerAngle = 270;
    const sectorAngle = 360 / sectors.length;
    const winningAngle = (pointerAngle - normalizedAngle + 360) % 360;
    const index = Math.floor(winningAngle / sectorAngle) % sectors.length;

    setTimeout(() => {
        showResult(sectors[index]);
        confetti();
    }, 450);
}

function showResult(text) {
    document.getElementById("resultCard").style.display = "flex";
    document.getElementById("resultText").innerHTML =
        "🎯 Testamenttisi kohde on:<br><b>" + text + "</b>";
}

function confetti() {
    for (let i = 0; i < 140; i++) {
        const c = document.createElement("div");

        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDuration = (Math.random() * 2.5 + 2) + "s";
        c.style.transform = `rotate(${Math.random() * 360}deg)`;

        document.body.appendChild(c);

        setTimeout(() => c.remove(), 5200);
    }
}
</script>

</body>
</html>
