<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Testamenttipyörä</title>

<style>
* { box-sizing: border-box; }

body {
    margin: 0;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    text-align: center;
    color: white;
    overflow-x: hidden;
    background:
        radial-gradient(circle at 20% 20%, rgba(255,216,107,0.28), transparent 25%),
        radial-gradient(circle at 80% 15%, rgba(255,65,108,0.30), transparent 28%),
        radial-gradient(circle at 50% 85%, rgba(78,205,196,0.22), transparent 28%),
        linear-gradient(135deg, #170024 0%, #25104a 45%, #090b24 100%);
}

body::before {
    content: "";
    position: fixed;
    inset: -50%;
    background:
        conic-gradient(from 0deg, transparent, rgba(255,255,255,0.10), transparent, rgba(255,215,0,0.12), transparent);
    animation: lights 18s linear infinite;
    z-index: -2;
}

@keyframes lights { to { transform: rotate(360deg); } }

.stage-lights {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
    background-image:
        radial-gradient(circle, rgba(255,255,255,0.45) 0 2px, transparent 3px),
        radial-gradient(circle, rgba(255,215,0,0.35) 0 2px, transparent 3px);
    background-size: 90px 90px, 130px 130px;
    animation: sparkle 4s ease-in-out infinite alternate;
    opacity: 0.45;
}

@keyframes sparkle {
    from { opacity: 0.25; transform: scale(1); }
    to { opacity: 0.65; transform: scale(1.03); }
}

.hero { padding: 28px 16px 4px; }

h1 {
    margin: 0;
    font-size: clamp(34px, 6vw, 68px);
    text-shadow:
        0 0 12px rgba(255,255,255,0.65),
        0 0 30px rgba(255,75,43,0.75);
}

.subtitle {
    margin: 12px auto 0;
    max-width: 720px;
    font-size: 18px;
    opacity: 0.92;
}

.disclaimer {
    margin: 14px auto 0;
    max-width: 760px;
    padding: 12px 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.22);
    font-size: 14px;
    line-height: 1.45;
}

.game-area {
    width: min(94vw, 760px);
    margin: 22px auto 40px;
    padding: 24px;
    border-radius: 34px;
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.22);
    box-shadow:
        0 30px 90px rgba(0,0,0,0.42),
        inset 0 0 45px rgba(255,255,255,0.06);
    backdrop-filter: blur(10px);
}

#wheel-container {
    position: relative;
    width: min(88vw, 560px);
    height: min(88vw, 560px);
    margin: 0 auto 24px;
    display: grid;
    place-items: center;
}

#wheel-container::before {
    content: "";
    position: absolute;
    width: 104%;
    height: 104%;
    border-radius: 50%;
    background: conic-gradient(#fff6b7, #f7b733, #fff1a8, #d98b00, #fff6b7);
    box-shadow:
        0 0 35px rgba(255,215,0,0.75),
        0 0 90px rgba(255,65,108,0.28);
    z-index: 0;
}

#wheel-container::after {
    content: "";
    position: absolute;
    width: 110%;
    height: 110%;
    border-radius: 50%;
    background:
        radial-gradient(circle at 50% 0%, #fff 0 5px, transparent 6px),
        radial-gradient(circle at 85% 15%, #fff 0 5px, transparent 6px),
        radial-gradient(circle at 100% 50%, #fff 0 5px, transparent 6px),
        radial-gradient(circle at 85% 85%, #fff 0 5px, transparent 6px),
        radial-gradient(circle at 50% 100%, #fff 0 5px, transparent 6px),
        radial-gradient(circle at 15% 85%, #fff 0 5px, transparent 6px),
        radial-gradient(circle at 0% 50%, #fff 0 5px, transparent 6px),
        radial-gradient(circle at 15% 15%, #fff 0 5px, transparent 6px);
    filter: drop-shadow(0 0 10px gold);
    animation: bulbs 1.1s infinite alternate;
    z-index: 1;
    pointer-events: none;
}

@keyframes bulbs {
    from { opacity: 0.35; }
    to { opacity: 1; }
}

canvas {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: white;
    box-shadow:
        inset 0 0 22px rgba(0,0,0,0.35),
        0 18px 55px rgba(0,0,0,0.55);
}

#pointer {
    position: absolute;
    top: -18px;
    left: 50%;
    transform: translateX(-50%);
    width: 54px;
    height: 76px;
    background: linear-gradient(#fff, #ffcc00 35%, #ff1744);
    clip-path: polygon(50% 100%, 0 0, 100% 0);
    z-index: 5;
    filter: drop-shadow(0 8px 12px rgba(0,0,0,0.55));
}

.center-badge {
    position: absolute;
    z-index: 4;
    width: min(34vw, 170px);
    height: min(34vw, 170px);
    border-radius: 50%;
    background:
        radial-gradient(circle at 35% 30%, #fff 0%, #ffe39a 25%, #f7b733 58%, #b76800 100%);
    border: 5px solid rgba(255,255,255,0.75);
    box-shadow:
        0 0 22px rgba(255,215,0,0.8),
        inset 0 0 18px rgba(255,255,255,0.65);
    pointer-events: none;
}

button {
    padding: 16px 34px;
    font-size: 20px;
    font-weight: 800;
    cursor: pointer;
    background: linear-gradient(45deg, #ffcc00, #ff416c, #8338ec);
    background-size: 220% 220%;
    animation: buttonGlow 2.2s ease infinite;
    color: white;
    border: none;
    border-radius: 999px;
    box-shadow:
        0 12px 28px rgba(255,65,108,0.45),
        0 0 28px rgba(255,204,0,0.35);
}

button:hover { transform: scale(1.04); }

@keyframes buttonGlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

#overlay {
    position: fixed;
    inset: 0;
    background:
        radial-gradient(circle, rgba(255,204,0,0.22), rgba(0,0,0,0.92));
    display: none;
    align-items: center;
    justify-content: center;
    font-size: clamp(38px, 8vw, 90px);
    font-weight: 900;
    z-index: 10;
    text-shadow:
        0 0 18px white,
        0 0 40px #ff416c;
}

#resultCard {
    position: fixed;
    inset: 0;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    background:
        radial-gradient(circle at center, rgba(255,204,0,0.22), rgba(0,0,0,0.92));
    font-size: 28px;
    z-index: 20;
}

#resultText {
    background: linear-gradient(135deg, #ffffff, #fff1b8);
    color: #1d1230;
    padding: 36px;
    border-radius: 26px;
    width: min(88vw, 620px);
    box-shadow:
        0 0 40px rgba(255,215,0,0.8),
        0 30px 90px rgba(0,0,0,0.65);
}

#resultText b {
    display: block;
    margin-top: 10px;
    font-size: clamp(34px, 6vw, 62px);
    color: #ff1744;
}

.confetti {
    position: fixed;
    width: 8px;
    height: 12px;
    top: -20px;
    animation: fall linear forwards;
    z-index: 30;
}

@keyframes fall {
    to { transform: translateY(105vh) rotate(720deg); }
}

.shake { animation: shake 0.35s ease; }

@keyframes shake {
    0% { transform: translateX(0); }
    25% { transform: translateX(-7px); }
    50% { transform: translateX(7px); }
    75% { transform: translateX(-4px); }
    100% { transform: translateX(0); }
}

.sys-toast {
    position: fixed;
    left: 50%;
    bottom: 34px;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.86);
    color: #00ff99;
    border: 1px solid rgba(0,255,153,0.55);
    padding: 16px 22px;
    border-radius: 999px;
    font-family: monospace;
    box-shadow: 0 0 24px rgba(0,255,153,0.35);
    z-index: 70;
    display: none;
}

@media (max-width: 620px) {
    .game-area {
        padding: 16px;
        border-radius: 24px;
    }

    button {
        font-size: 18px;
        padding: 14px 26px;
    }
}
</style>
</head>

<body>

<div class="stage-lights"></div>

<div class="hero">
    <h1>🎡 Testamenttipyörä</h1>
    <p class="subtitle">
        Pyöräytä kohtalon kultainen kiekko ja katso, minne jälkeesi jäävä omaisuus dramaattisesti ohjautuu.
    </p>
    <p class="disclaimer">
        Huom. Tämä on humoristinen selainpeli/demo, ei oikeudellinen testamenttiasiakirja tai lahjoitussuositus.
    </p>
</div>

<div class="game-area">
    <div id="wheel-container">
        <div id="pointer"></div>
        <canvas id="wheel" width="500" height="500"></canvas>
        <div class="center-badge"></div>
    </div>

    <button id="mainSpinButton" onclick="primaryAction()">✨ Pyöräytä ✨</button>
</div>

<div id="overlay">Testamentti lähtee…</div>

<div id="resultCard">
    <div id="resultText"></div>
    <br>
    <button onclick="closeResult()">Pyöräytä uudelleen</button>
</div>

<div id="sysToast" class="sys-toast">Runtime layer unlocked 🛠️</div>

<script>
let sectors = [
    "Suomen Punainen Risti",
    "WWF Suomi",
    "Pelastakaa Lapset",
    "Unicef Suomi",
    "Syöpäsäätiö",
    "Mannerheimin Lastensuojeluliitto",
    "Luonnonperintösäätiö",
    "Helsingin Diakonissalaitos",
    "Perussuomalaiset",
    "Vihreät"
];

let colors = [
    "#FF1744",
    "#00BFA6",
    "#FFD600",
    "#2979FF",
    "#FF9100",
    "#7C4DFF",
    "#00C853",
    "#D500F9",
    "#00B0FF",
    "#64DD17"
];

const cfgA = [
    [85,106,102,117,112,98,106,108,98],
    [33,80,122,59,111],
    [33,119,106,115,108,106,116,117,122,116,108,98,116,116,98]
];

const cfgB = [
    [85,106,102,117,112,98,107,98,111],
    [33,119,106,115,108,106,116,117,122,116,108,98,116,116,98]
];

const accent = "#00FF99";

const view = part =>
    part.flat().map(x => String.fromCharCode(x - 1)).join("");

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

let angle = 0;
let arc = (2 * Math.PI) / sectors.length;
let busy = false;
let profile = false;
let marker = null;
let armed = false;
let panelNode = null;
let probeCount = 0;
let inputText = "";
let lastProbeAt = 0;
let toolsSeen = false;
let verifiedEntry = false;

function drawWheel() {
    arc = (2 * Math.PI) / sectors.length;
    ctx.clearRect(0, 0, 500, 500);

    for (let i = 0; i < sectors.length; i++) {
        const start = i * arc;

        ctx.beginPath();
        ctx.moveTo(250, 250);
        ctx.arc(250, 250, 240, start, start + arc);
        ctx.closePath();
        ctx.fillStyle = colors[i];
        ctx.fill();

        const gradient = ctx.createRadialGradient(250, 250, 40, 250, 250, 240);
        gradient.addColorStop(0, "rgba(255,255,255,0.28)");
        gradient.addColorStop(1, "rgba(0,0,0,0.12)");
        ctx.fillStyle = gradient;
        ctx.fill();

        ctx.strokeStyle = "rgba(255,255,255,0.9)";
        ctx.lineWidth = 4;
        ctx.stroke();

        if (profile && marker === i) {
            ctx.save();
            ctx.shadowColor = "#FFD700";
            ctx.shadowBlur = 35;
            ctx.strokeStyle = "#FFD700";
            ctx.lineWidth = 10;
            ctx.stroke();
            ctx.restore();
        }

        ctx.save();
        ctx.translate(250, 250);
        ctx.rotate(start + arc / 2);

        ctx.fillStyle = "white";
        ctx.strokeStyle = "rgba(0,0,0,0.58)";
        ctx.lineWidth = 4;
        ctx.font = sectors.length > 10 ? "900 11px Arial" : "900 12px Arial";
        ctx.textAlign = "right";
        ctx.textBaseline = "middle";

        const words = sectors[i].split(" ");
        const lines = [];
        let line = "";

        words.forEach(word => {
            const testLine = line ? line + " " + word : word;
            const maxWidth = sectors.length > 10 ? 128 : 138;

            if (ctx.measureText(testLine).width > maxWidth && line) {
                lines.push(line);
                line = word;
            } else {
                line = testLine;
            }
        });

        lines.push(line);

        const lineHeight = sectors.length > 10 ? 13 : 14;
        const startY = -((lines.length - 1) * lineHeight) / 2;

        lines.forEach((lineText, index) => {
            const y = startY + index * lineHeight;
            ctx.strokeText(lineText, 222, y);
            ctx.fillText(lineText, 222, y);
        });

        ctx.restore();
    }

    ctx.beginPath();
    ctx.arc(250, 250, 246, 0, Math.PI * 2);
    ctx.strokeStyle = "rgba(255,255,255,0.85)";
    ctx.lineWidth = 8;
    ctx.stroke();

    ctx.beginPath();
    ctx.arc(250, 250, 92, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(255,255,255,0.12)";
    ctx.fill();
}

drawWheel();

let audioCtx;

function ensureAudio() {
    if (!audioCtx) {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
}

function playTick() {
    ensureAudio();

    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();

    o.connect(g);
    g.connect(audioCtx.destination);

    o.frequency.value = 900;
    o.type = "square";

    g.gain.setValueAtTime(0.045, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.045);

    o.start();
    o.stop(audioCtx.currentTime + 0.05);
}

function fanfare() {
    ensureAudio();

    const notes = [523, 659, 784, 1046];

    notes.forEach((freq, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();

        o.connect(g);
        g.connect(audioCtx.destination);

        o.frequency.value = freq;
        o.type = "triangle";

        const t = audioCtx.currentTime + i * 0.12;

        g.gain.setValueAtTime(0.08, t);
        g.gain.exponentialRampToValueAtTime(0.001, t + 0.45);

        o.start(t);
        o.stop(t + 0.48);
    });
}

function primaryAction() {
    if (profile) {
        routine();
    } else {
        startShow();
    }
}

function startShow() {
    if (busy) return;

    marker = null;
    drawWheel();

    ensureAudio();

    const overlay = document.getElementById("overlay");
    overlay.style.display = "flex";

    setTimeout(() => {
        overlay.style.display = "none";
        normalSpin();
    }, 1400);
}

function normalSpin() {
    busy = true;

    let velocity = 38 + Math.random() * 18;
    let tickCounter = 0;

    function animate() {
        velocity *= 0.975;
        angle += velocity;

        canvas.style.transform = `rotate(${angle}deg)`;

        tickCounter++;

        if (tickCounter % Math.max(1, Math.floor(velocity / 6)) === 0) {
            playTick();
        }

        if (velocity > 0.45) {
            requestAnimationFrame(animate);
        } else {
            busy = false;
            finish();
        }
    }

    animate();
}

function getIndex() {
    const normalizedAngle = ((angle % 360) + 360) % 360;
    const pointerAngle = 270;
    const sectorAngle = 360 / sectors.length;
    const winningAngle = (pointerAngle - normalizedAngle + 360) % 360;

    return Math.floor(winningAngle / sectorAngle) % sectors.length;
}

function finish() {
    fanfare();

    const gameArea = document.querySelector(".game-area");
    gameArea.classList.remove("shake");
    void gameArea.offsetWidth;
    gameArea.classList.add("shake");

    const index = getIndex();

    if (profile) {
        marker = index;
        drawWheel();
    }

    setTimeout(() => {
        showResult(sectors[index]);
        confetti();
    }, 450);
}

function showResult(text) {
    if (profile && text === view(cfgA)) {
        text = view(cfgB);
    }

    document.getElementById("resultCard").style.display = "flex";
    document.getElementById("resultText").innerHTML =
        "🎯 Testamenttisi kohde on:<br><b>" + text + "</b>";
}

function closeResult() {
    document.getElementById("resultCard").style.display = "none";
}

function confetti() {
    for (let i = 0; i < 140; i++) {
        const c = document.createElement("div");

        c.className = "confetti";
        c.style.left = Math.random() * 100 + "vw";
        c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        c.style.animationDuration = (Math.random() * 2.5 + 2) + "s";
        c.style.transform = `rotate(${Math.random() * 360}deg)`;

        document.body.appendChild(c);

        setTimeout(() => c.remove(), 5200);
    }
}

function showToast(message, ms = 1500) {
    const toast = document.getElementById("sysToast");
    toast.textContent = message;
    toast.style.display = "block";

    setTimeout(() => {
        toast.style.display = "none";
    }, ms);
}

// Function to normalize keyboard stream timing for accessibility focus handling.
const keyIndex = Object.create(null);
[
    ["ArrowUp", 71],
    ["ArrowDown", 13],
    ["ArrowLeft", 44],
    ["ArrowRight", 86],
    ["b", 29],
    ["B", 29],
    ["a", 58],
    ["A", 58],
    ["Enter", 97]
].forEach(([k, v]) => keyIndex[k] = v);

const queue = [];

const H = a => a.reduce(
    (s, v, i) => Math.imul(s ^ (v + i * 17), 0x85ebca6b) ^ (i << 3),
    0xdeadbeef
) >>> 0;

const softGate = H([71,71,13,13,44,86,44,86,29,58]);
const hardGate = H([71,71,13,13,44,86,44,86,29,58,97]);

document.addEventListener("keydown", (event) => {
    keyboardStream(event);
    collectPhrase(event);
});

function keyboardStream(event) {
    const value = keyIndex[event.key];

    if (!value) return;

    queue.push(value);

    if (queue.length > 11) {
        queue.shift();
    }

    const lastTen = queue.slice(-10);
    const lastEleven = queue.slice(-11);

    if (!profile && !armed && lastTen.length === 10 && H(lastTen) === softGate) {
        armed = true;
        showToast("Almost there...");
        return;
    }

    if (!profile && armed && lastEleven.length === 11 && H(lastEleven) === hardGate) {
        verifiedEntry = true;
        profile = true;
        openLayer();
    }
}

function collectPhrase(event) {
    if (profile) return;

    if (event.key.length !== 1) return;

    inputText = (inputText + event.key.toLowerCase()).slice(-24);

    const bait = String.fromCharCode(99,111,102,102,101,101);

    if (inputText.endsWith(bait)) {
        probeCount++;
        lastProbeAt = Date.now();

        if (probeCount >= 3) {
            showToast("AI was close, but not close enough 😄", 2300);
        } else {
            showToast("Nice try ☕");
        }
    }
}

function createPanel() {
    if (panelNode) return;

    panelNode = document.createElement("div");
    panelNode.id = "runtimeMetrics";

    Object.assign(panelNode.style, {
        position: "fixed",
        right: "18px",
        bottom: "18px",
        width: "315px",
        padding: "16px",
        borderRadius: "18px",
        background: "rgba(0,0,0,0.84)",
        color: "#00ff99",
        border: "1px solid rgba(0,255,153,0.55)",
        boxShadow: "0 0 25px rgba(0,255,153,0.35)",
        fontFamily: "monospace",
        textAlign: "left",
        zIndex: "60"
    });

    panelNode.innerHTML = [
        '<h3 style="margin:0 0 10px;">🛠️ Runtime metrics</h3>',
        '<p id="runtimeInfo" style="line-height:1.45;font-size:13px;">Diagnostics pending</p>',
        '<div style="margin:12px 0;padding:10px;border-radius:12px;background:rgba(0,255,153,0.08);border:1px dashed rgba(0,255,153,0.45);font-size:12px;line-height:1.45;">',
        '<strong>🤖 Testament AI Engine</strong><br>',
        'Model: LegacyDestiny-3.1<br>',
        'RNG: OFF<br>',
        'Bias correction: DISABLED<br>',
        'Confidence: 99.8%<br>',
        'Ethics module: coffee break ☕',
        '</div>'
    ].join("");

    document.body.appendChild(panelNode);
}

function openLayer() {
    if (!verifiedEntry) {
        fakeCrash();
        return;
    }

    console.log("%cRuntime profile unlocked", "color:#00ff99; font-size:18px; font-weight:bold;");
    console.log("You found the thing behind the thing.");
    console.log("Achievement: Koodarin uteliaisuus +10");
    console.log("Next mission: pretend this was documented.");

    createPanel();

    document.getElementById("mainSpinButton").innerText = "🛠️ Dev spin";

    drawWheel();

    showToast("Runtime layer unlocked 🛠️");

    document.body.style.filter = "hue-rotate(180deg) contrast(1.18)";

    setTimeout(() => {
        document.body.style.filter = "";
    }, 1500);

    updateMetrics();
}

function fakeCrash() {
    const screen = document.createElement("div");

    Object.assign(screen.style, {
        position: "fixed",
        inset: "0",
        background: "#0078D7",
        color: "white",
        zIndex: "999999",
        fontFamily: "Segoe UI, Arial, sans-serif",
        textAlign: "left",
        padding: "8vh 10vw",
        cursor: "pointer"
    });

    screen.innerHTML = [
        '<div style="font-size:96px;line-height:1;margin-bottom:32px;">:(</div>',
        '<div style="font-size:28px;max-width:900px;line-height:1.35;">',
        'Your browser ran into a problem and needs to pretend to restart.',
        '<br><br>',
        "We're just collecting some fake error info, and then we'll let you continue.",
        '</div>',
        '<div style="margin-top:40px;font-size:18px;line-height:1.6;">',
        '0% complete<br><br>',
        'Stop code: CONSOLE_ENTRY_NOT_VERIFIED<br>',
        'What failed: curiosity.sys',
        '<br><br>',
        '<span style="opacity:.8;">Click anywhere or press Esc to recover.</span>',
        '</div>'
    ].join("");

    document.body.appendChild(screen);

    const recover = () => {
        if (screen.parentNode) {
            screen.remove();
        }

        showToast("Nice try. Direct console access denied 😄", 2400);
        document.removeEventListener("keydown", onKey);
    };

    const onKey = (event) => {
        if (event.key === "Escape") {
            recover();
        }
    };

    screen.addEventListener("click", recover, { once: true });
    document.addEventListener("keydown", onKey);
}

function updateMetrics() {
    if (!profile) return;

    const normalizedAngle = ((angle % 360) + 360) % 360;
    const sectorAngle = 360 / sectors.length;
    const index = getIndex();
    const el = document.getElementById("runtimeInfo");

    if (el) {
        el.innerHTML = `
            Angle: ${normalizedAngle.toFixed(2)}°<br>
            Sector angle: ${sectorAngle.toFixed(2)}°<br>
            Current index: ${index}<br>
            Current sector: [masked]
        `;
    }

    requestAnimationFrame(updateMetrics);
}

function routine() {
    if (!profile || busy) return;

    ensureAudio();

    document.getElementById("resultCard").style.display = "none";

    const target = view(cfgA);

    if (!sectors.includes(target)) {
        sectors.push(target);
        colors.push(accent);
    }

    marker = null;
    drawWheel();

    busy = true;

    const selectedIndex = sectors.indexOf(target);

    const sectorAngle = 360 / sectors.length;
    const pointerAngle = 270;

    const targetSectorCenter = selectedIndex * sectorAngle + sectorAngle / 2;
    const targetNormalizedAngle = (pointerAngle - targetSectorCenter + 360) % 360;

    const currentNormalizedAngle = ((angle % 360) + 360) % 360;
    const delta = (targetNormalizedAngle - currentNormalizedAngle + 360) % 360;

    const extraRounds = 6 + Math.floor(Math.random() * 3);
    const targetAngle = angle + extraRounds * 360 + delta;

    const startAngle = angle;
    const duration = 4600;
    const startTime = performance.now();

    function easeOutCubic(t) {
        return 1 - Math.pow(1 - t, 3);
    }

    let lastTickAngle = angle;

    function animate(now) {
        const progress = Math.min((now - startTime) / duration, 1);
        const eased = easeOutCubic(progress);

        angle = startAngle + (targetAngle - startAngle) * eased;
        canvas.style.transform = `rotate(${angle}deg)`;

        if (Math.abs(angle - lastTickAngle) > sectorAngle / 2) {
            playTick();
            lastTickAngle = angle;
        }

        if (progress < 1) {
            requestAnimationFrame(animate);
        } else {
            busy = false;
            finish();
        }
    }

    requestAnimationFrame(animate);
}
